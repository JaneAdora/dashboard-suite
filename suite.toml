# rsuite manifest: cargo-built components + glance panels.
# `repo` is relative to ~/projects (override with $RSUITE_PROJECTS).
# `package` set => `cargo build -p <package>` in that repo (workspace member);
# omitted => `cargo build` in the repo. `artifact` = target/release/<artifact>;
# `bin` = installed command name. `prefix` = per-component install dir
# override (default ~/.local/bin; a leading ~ expands to $HOME).

[[launcher]]
name = "gst"
summary = "git status/log"
repo = "launchers"
package = "gst"
artifact = "gst"
bin = "gst"
requires = ["git"]
default = true

[[launcher]]
name = "clip"
summary = "clipboard ring"
repo = "launchers"
package = "clip"
artifact = "clip"
bin = "clip"
requires = ["cliphist"]
default = true

[[launcher]]
name = "1p"
summary = "1Password vault"
repo = "launchers"
package = "onepw"
artifact = "onepw"
bin = "1p"
requires = ["op"]
default = false

[[launcher]]
name = "proc"
summary = "process killer"
repo = "launchers"
package = "proc"
artifact = "proc"
bin = "proc"
requires = []
default = true

[[launcher]]
name = "roam"
summary = "file browser"
repo = "roam"
artifact = "roam"
bin = "roam"
requires = []
default = true

[[launcher]]
name = "wt"
summary = "git worktrees"
repo = "wt"
artifact = "wt"
bin = "wt"
requires = ["git"]
default = true
prefix = "~/.cargo/bin"

[[launcher]]
name = "recall"
summary = "cc-session browser"
repo = "recall"
artifact = "recall"
bin = "recall"
requires = []
default = false
prefix = "~/.cargo/bin"

[[launcher]]
name = "glance"
summary = "dashboard tile host"
repo = "glance"
artifact = "glance"
bin = "glance"
requires = []
default = true

# --- glance panels (generated from glance ALL_PANELS) ---
[[launcher]]
